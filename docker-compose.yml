version: '3.8'

services:
  # Backend API Service
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - AWS_REGION=${AWS_REGION:-us-east-1}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - S3_BUCKET_NAME=${S3_BUCKET_NAME}
      - DYNAMODB_TABLE_PREFIX=${DYNAMODB_TABLE_PREFIX:-creator-dashboard}
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=${JWT_SECRET}
      - BEDROCK_MODEL_TEXT=us.amazon.nova-lite-v1:0
      - BEDROCK_MODEL_VISION=us.amazon.nova-pro-v1:0
    volumes:
      - ./backend:/app
      - video-processing:/tmp/video-processing
    depends_on:
      - redis
      - localstack
    networks:
      - creator-network

  # Frontend Next.js Service
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:8000
      - NODE_ENV=production
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - backend
    networks:
      - creator-network

  # Redis for caching and session management
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - creator-network
    command: redis-server --appendonly yes

  # Celery Worker for background tasks
  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: celery -A app.celery_app worker --loglevel=info --concurrency=4
    environment:
      - AWS_REGION=${AWS_REGION:-us-east-1}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - S3_BUCKET_NAME=${S3_BUCKET_NAME}
      - DYNAMODB_TABLE_PREFIX=${DYNAMODB_TABLE_PREFIX:-creator-dashboard}
      - REDIS_URL=redis://redis:6379
      - BEDROCK_MODEL_TEXT=us.amazon.nova-lite-v1:0
      - BEDROCK_MODEL_VISION=us.amazon.nova-pro-v1:0
    volumes:
      - ./backend:/app
      - video-processing:/tmp/video-processing
    depends_on:
      - redis
      - backend
    networks:
      - creator-network

  # Celery Beat for scheduled tasks
  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: celery -A app.celery_app beat --loglevel=info
    environment:
      - AWS_REGION=${AWS_REGION:-us-east-1}
      - REDIS_URL=redis://redis:6379
      - DYNAMODB_TABLE_PREFIX=${DYNAMODB_TABLE_PREFIX:-creator-dashboard}
    volumes:
      - ./backend:/app
    depends_on:
      - redis
      - backend
    networks:
      - creator-network

  # LocalStack for local AWS services (development only)
  localstack:
    image: localstack/localstack:latest
    ports:
      - "4566:4566"
    environment:
      - SERVICES=s3,dynamodb
      - DEBUG=1
      - DATA_DIR=/tmp/localstack/data
    volumes:
      - localstack-data:/tmp/localstack
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - creator-network

volumes:
  redis-data:
  localstack-data:
  video-processing:

networks:
  creator-network:
    driver: bridge
